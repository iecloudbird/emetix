name: Pipeline Full Universe Scan

# Manual trigger + automated cron schedules
on:
  workflow_dispatch:
    inputs:
      stage:
        description: "Pipeline stage to run"
        required: true
        default: "stage1"
        type: choice
        options:
          - stage1
          - stage2
          - stage3
          - full
      fresh:
        description: "Clear existing data before running"
        required: false
        default: false
        type: boolean
      limit:
        description: "Limit stocks (for testing, 0 = no limit)"
        required: false
        default: "0"
        type: string
  schedule:
    # Stage 1: Full universe scan - 1st of each month at 06:00 UTC
    - cron: "0 6 1 * *"
    # Stage 2: Qualified update - every Monday at 06:00 UTC
    - cron: "0 6 * * 1"
    # Stage 3: Watchlist curation - weekdays at 06:00 UTC
    - cron: "0 6 * * 1-5"

env:
  MONGODB_URI: ${{ secrets.MONGODB_URI }}
  GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

jobs:
  pipeline-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 360 # 6 hours max

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create .env file
        run: |
          echo "MONGODB_URI=${{ secrets.MONGODB_URI }}" >> .env
          echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" >> .env

      # Determine which stage to run (manual input or cron schedule)
      - name: Determine Stage
        id: stage
        run: |
          if [ "${{ github.event_name }}" == "schedule" ]; then
            CRON="${{ github.event.schedule }}"
            if [ "$CRON" == "0 6 1 * *" ]; then
              echo "stage=stage1" >> $GITHUB_OUTPUT
            elif [ "$CRON" == "0 6 * * 1" ]; then
              echo "stage=stage2" >> $GITHUB_OUTPUT
            else
              echo "stage=stage3" >> $GITHUB_OUTPUT
            fi
          else
            echo "stage=${{ github.event.inputs.stage }}" >> $GITHUB_OUTPUT
          fi

      - name: Run Stage 1 - Full Universe Scan
        if: ${{ steps.stage.outputs.stage == 'stage1' || steps.stage.outputs.stage == 'full' || (github.event.inputs.stage == 'stage1') || (github.event.inputs.stage == 'full') }}
        run: |
          FRESH_FLAG=""
          LIMIT_FLAG=""

          if [ "${{ github.event.inputs.fresh }}" == "true" ]; then
            FRESH_FLAG="--fresh"
          fi

          if [ "${{ github.event.inputs.limit }}" != "0" ]; then
            LIMIT_FLAG="--limit ${{ github.event.inputs.limit }}"
          fi

          echo "Running Stage 1: Full Universe Scan"
          echo "Options: $FRESH_FLAG $LIMIT_FLAG"

          python scripts/pipeline/full_universe_scan.py $FRESH_FLAG $LIMIT_FLAG --delay 500

      - name: Run Stage 2 - Qualified Update
        if: ${{ steps.stage.outputs.stage == 'stage2' || steps.stage.outputs.stage == 'full' || (github.event.inputs.stage == 'stage2') || (github.event.inputs.stage == 'full') }}
        run: |
          FRESH_FLAG=""

          if [ "${{ github.event.inputs.fresh }}" == "true" ]; then
            FRESH_FLAG="--fresh"
          fi

          echo "Running Stage 2: Qualified Update"
          python scripts/pipeline/daily_qualified_update_v3.py $FRESH_FLAG --force-all

      - name: Run Stage 3 - Curate Watchlist
        if: ${{ steps.stage.outputs.stage == 'stage3' || steps.stage.outputs.stage == 'full' || (github.event.inputs.stage == 'stage3') || (github.event.inputs.stage == 'full') }}
        run: |
          echo "Running Stage 3: Curate Watchlist"
          python scripts/pipeline/stage3_curate_watchlist.py

      - name: Upload Watchlist Artifact
        if: ${{ steps.stage.outputs.stage == 'stage3' || steps.stage.outputs.stage == 'full' || (github.event.inputs.stage == 'stage3') || (github.event.inputs.stage == 'full') }}
        uses: actions/upload-artifact@v4
        with:
          name: curated-watchlist
          path: data/processed/curated_watchlist.json
          retention-days: 30

      - name: Summary
        run: |
          echo "## Pipeline Scan Complete! 🎉" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Stage**: ${{ github.event.inputs.stage }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Fresh Start**: ${{ github.event.inputs.fresh }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Limit**: ${{ github.event.inputs.limit }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check MongoDB Atlas for results." >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────────────────────────────────────
  # Notification job — always runs regardless of pipeline-scan outcome
  # ─────────────────────────────────────────────────────────────────────────────
  notify:
    name: Send Notifications
    runs-on: ubuntu-latest
    needs: pipeline-scan
    if: always()

    steps:
      - name: Build status message
        id: msg
        run: |
          RESULT="${{ needs.pipeline-scan.result }}"
          STAGE="${{ github.event.inputs.stage || 'scheduled (cron)' }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          case "$RESULT" in
            success)   ICON="SUCCESS ✅" ;;
            failure)   ICON="FAILED ❌"  ;;
            cancelled) ICON="CANCELLED ⚠️" ;;
            *)         ICON="$RESULT"   ;;
          esac

          echo "result=$RESULT"     >> $GITHUB_OUTPUT
          echo "icon=$ICON"         >> $GITHUB_OUTPUT
          echo "stage=$STAGE"       >> $GITHUB_OUTPUT
          echo "run_url=$RUN_URL"   >> $GITHUB_OUTPUT

      # ── Email notification ─────────────────────────────────────────────────
      # Required secrets (Settings → Secrets and variables → Actions):
      #   NOTIFY_GMAIL_USERNAME   – Gmail address used as sender
      #   NOTIFY_GMAIL_APP_PASSWORD – Gmail App Password (NOT your login password)
      #                              Create one at: myaccount.google.com/apppasswords
      #   NOTIFY_EMAIL            – Destination email (can be same as sender)
      - name: Send Email Notification
        uses: dawidd6/action-send-mail@v3
        continue-on-error: true # won't fail rest of job if secrets are absent
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.NOTIFY_GMAIL_USERNAME }}
          password: ${{ secrets.NOTIFY_GMAIL_APP_PASSWORD }}
          subject: "[${{ steps.msg.outputs.icon }}] Emetix Pipeline — ${{ steps.msg.outputs.stage }}"
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: "Emetix Pipeline <${{ secrets.NOTIFY_GMAIL_USERNAME }}>"
          html_body: |
            <h2>Emetix Pipeline Scan — ${{ steps.msg.outputs.icon }}</h2>
            <table style="border-collapse:collapse;font-family:monospace">
              <tr><td style="padding:4px 12px"><b>Status</b></td> <td>${{ steps.msg.outputs.result }}</td></tr>
              <tr><td style="padding:4px 12px"><b>Stage</b></td>  <td>${{ steps.msg.outputs.stage }}</td></tr>
              <tr><td style="padding:4px 12px"><b>Trigger</b></td><td>${{ github.event_name }}</td></tr>
              <tr><td style="padding:4px 12px"><b>Details</b></td>
                  <td><a href="${{ steps.msg.outputs.run_url }}">${{ steps.msg.outputs.run_url }}</a></td></tr>
            </table>

      # ── WhatsApp notification (Callmebot — FREE, no extra account needed) ──
      # One-time setup on your phone:
      #   1. Save +34 644 66 32 62 as a contact in WhatsApp
      #   2. Send the message:  I allow callmebot
      #   3. You'll receive an apikey in reply — save it as a secret below
      # Required secrets:
      #   WHATSAPP_PHONE   – your number with country code, no + symbol
      #                      e.g. for Malaysia: 601X-XXXXXXX → 601XXXXXXXXX
      #   WHATSAPP_APIKEY  – the API key received from step 3
      - name: Send WhatsApp Notification
        continue-on-error: true # won't fail rest of job if secrets are absent
        run: |
          MESSAGE="[Emetix] Pipeline ${{ steps.msg.outputs.icon }} | Stage: ${{ steps.msg.outputs.stage }} | ${{ steps.msg.outputs.run_url }}"

          ENCODED=$(python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1]))" "$MESSAGE")

          curl -s --max-time 30 \
            "https://api.callmebot.com/whatsapp.php?phone=${{ secrets.WHATSAPP_PHONE }}&text=${ENCODED}&apikey=${{ secrets.WHATSAPP_APIKEY }}"
